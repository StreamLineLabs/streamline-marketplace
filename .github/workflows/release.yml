name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write    # cosign keyless + attestations
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2

      - name: Build all transforms
        run: |
          for dir in transforms/*/; do
            echo "Building $dir..."
            cargo build --release --manifest-path "${dir}Cargo.toml" --target wasm32-wasip1
          done

      - name: Build registry CLI
        run: cargo build --release -p streamline-marketplace-cli

      - name: Stage release artifacts
        id: stage
        run: |
          mkdir -p dist
          cp target/wasm32-wasip1/release/*.wasm dist/ 2>/dev/null || true
          cp target/release/streamline-marketplace-cli dist/ 2>/dev/null || true
          ls -la dist/

      # ---- Supply-chain hardening ---------------------------------------
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Sign each artifact (keyless)
        env:
          COSIGN_EXPERIMENTAL: 'true'
        run: |
          set -euo pipefail
          for f in dist/*; do
            [ -f "$f" ] || continue
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done

      - name: Generate per-file SHA-256 manifest
        id: hash
        working-directory: dist
        run: |
          set -euo pipefail
          sha256sum * > SHA256SUMS
          # base64-encoded subject list for SLSA generator
          echo "hashes=$(sha256sum * | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance for artifacts
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'dist/*'

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.wasm
            dist/streamline-marketplace-cli
            dist/*.sig
            dist/*.pem
            dist/SHA256SUMS

  # SLSA Level 3 provenance for binary artifacts
  slsa-provenance:
    needs: [release]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ${{ needs.release.outputs.hashes }}
      upload-assets: true

