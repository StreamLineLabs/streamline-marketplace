name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - uses: Swatinem/rust-cache@v2

      - name: Build all transforms
        run: |
          for dir in transforms/*/; do
            echo "Building $dir..."
            cargo build --release --manifest-path "${dir}Cargo.toml" --target wasm32-wasip1
          done

      - name: Build registry CLI
        run: cargo build --release -p streamline-marketplace-cli

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            target/wasm32-wasip1/release/*.wasm
            target/release/streamline-marketplace-cli
